              - paragraph [ref=e196]: When a high-severity event happens on a factory floor, the safety team needs to review it fast, decide what to do, and document that decision. The old process was manual review of raw footage with no structure.
            - generic [ref=e197]:
              - paragraph [ref=e198]: What I Built
              - paragraph [ref=e199]: A triage interface with three clear actions (confirm, dismiss, escalate), rich video playback with timeline scrubbing and metadata overlays, and a complete decision audit trail. Every action is logged with who, when, and why.
            - generic [ref=e200]:
              - paragraph [ref=e201]: Key Decisions
              - paragraph [ref=e202]: Kept the action model to three options instead of a complex state machine. Speed matters in safety. Operators need to make a call in seconds, not navigate a workflow diagram.
            - generic [ref=e203]:
              - paragraph [ref=e204]: Outcomes
              - paragraph [ref=e205]: Review-to-action time compressed significantly. Compliance teams get a clean audit trail. Operators report the interface feels natural rather than bureaucratic.
