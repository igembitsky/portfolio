              - paragraph [ref=e116]: Context
              - paragraph [ref=e117]: Factory floors generate hundreds of camera events daily. Safety teams were drowning in noise and missing the signals that mattered. We needed a system that could surface the critical incidents and help teams act on them quickly.
            - generic [ref=e118]:
              - paragraph [ref=e119]: What I Built
              - paragraph [ref=e120]: A full analytics dashboard with pattern analysis across time periods, severity scoring, and trend visualization. Integrated an AI messaging layer where the system drafts responses that humans review, edit, and approve before sending. Built a learning loop that tracks which suggestions get used and which get rewritten.
            - generic [ref=e121]:
              - paragraph [ref=e122]: Key Decisions
              - paragraph [ref=e123]: Chose human-in-the-loop over full automation. Safety is high-stakes and customers need to trust the system before they trust the AI. The approval step builds that trust while the learning loop gradually improves draft quality.
            - generic [ref=e124]:
              - paragraph [ref=e125]: Outcomes
              - paragraph [ref=e126]: Deployed to production with paying pilot customers. Safety teams can now focus review time on high-signal events instead of scanning everything manually.
