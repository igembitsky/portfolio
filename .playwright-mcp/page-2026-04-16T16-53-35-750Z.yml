              - paragraph [ref=e157]: Context
              - paragraph [ref=e158]: The computer vision model needs structured, labeled data to get better at classification. Raw camera events come in unlabeled. Without a good taxonomy and consistent labeling workflow, the model trains on garbage.
            - generic [ref=e159]:
              - paragraph [ref=e160]: What I Built
              - paragraph [ref=e161]: A structured annotation workflow where safety teams label incidents by type, severity, and environment. Designed the ontology to be intuitive for non-technical operators so labels are consistent across different users and sites.
            - generic [ref=e162]:
              - paragraph [ref=e163]: Key Decisions
              - paragraph [ref=e164]: Invested in taxonomy design before any ML training. Spent time with safety teams understanding how they naturally categorize incidents, then built the labeling system around their mental model instead of imposing an engineering-driven schema.
            - generic [ref=e165]:
              - paragraph [ref=e166]: Outcomes
              - paragraph [ref=e167]: Clean, consistently labeled training data flowing into model improvement. The taxonomy is extensible as we encounter new incident types across different industrial environments.
